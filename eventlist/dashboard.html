<!DOCTYPE html>

<html>

<head>
    <title>Event Dashboard</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

    <div class="container mt-5">

        <h2>Event Dashboard</h2>

        <div class="card p-4">

            <h4>Add New Event</h4>

            <input id="event_name" class="form-control mb-2" placeholder="Event Name">

            <input id="event_date" type="date" class="form-control mb-2">

            <input id="location" class="form-control mb-2" placeholder="Event Location">

            <textarea id="description" class="form-control mb-3" placeholder="Event Description"></textarea>

            <button onclick="addEvent()" class="btn btn-primary">Add Event</button>
            <hr>

            <h3>Event List</h3>

            <button onclick="loadEvents()" class="btn btn-success mb-3">Show Events</button>

            <table class="table table-bordered">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Date</th>
                        <th>Location</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="eventTable"></tbody>

            </table>


        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
