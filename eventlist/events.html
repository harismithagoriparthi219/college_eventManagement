<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add Event</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>Event Management System</h2>

    <div class="form-container">

        <label>Event Name</label>
        <input type="text" id="event_name" placeholder="Enter event name">

        <label>Event Date</label>
        <input type="date" id="event_date">

        <label>Location</label>
        <input type="text" id="location" placeholder="Enter event location">

        <label>Description</label>
        <textarea id="description" placeholder="Enter event description"></textarea>

        <button onclick="addEvent()">Add Event</button>

    </div>

    <script src="script.js"></script>

</body>

</html>
